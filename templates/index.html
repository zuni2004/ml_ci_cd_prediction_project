<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CI/CD Build Predictor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; padding: 40px; }
        .container { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; width: 500px; }
        h2 { color: #3b82f6; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; }
        .success-msg { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #10b981; }
        .error-msg { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚡ Build Failure Predictor</h2>
        <form action="/predict" method="post">
            <!-- IMPORTANT: The 'name' attributes must match your CSV column names exactly -->
            <div class="input-group">
                <label>Source Churn (git_diff_src_churn)</label>
                <input type="number" name="git_diff_src_churn" placeholder="e.g. 50" required>
            </div>
            <div class="input-group">
                <label>Test Ratio (gh_test_lines_per_kloc)</label>
                <input type="number" step="any" name="gh_test_lines_per_kloc" placeholder="e.g. 200.5" required>
            </div>
            <div class="input-group">
                <label>Team Size (gh_team_size)</label>
                <input type="number" name="gh_team_size" placeholder="e.g. 10" required>
            </div>
            <!-- Add more inputs here following the same pattern -->
            
            <button type="submit">Analyze Commit Risk</button>
        </form>

        {% if prediction_text %}
        <div class="result {{ result_class }}">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>
</html>
